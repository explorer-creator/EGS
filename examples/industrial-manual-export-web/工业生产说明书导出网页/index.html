<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>绿色生产流程与报告导出</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" crossorigin="anonymous"></script>
  </head>
  <body>
    <div class="wrap">
      <header>
        <h1>绿色生产流程 · 综合报告生成</h1>
        <p>输入产品名称，生成绿色制造流程示意、设备/物料/工序与工艺信息，并导出 Excel 与 PDF</p>
      </header>

      <section class="panel no-print">
        <h2>产品输入</h2>
        <div class="input-row">
          <label for="product-input">产品名称</label>
          <input id="product-input" type="text" placeholder="例如：耳机、手机、锂电池、棉服…" autocomplete="off" />
          <button type="button" class="btn btn-primary" id="btn-generate">生成报告</button>
        </div>
        <div class="export-row" id="export-buttons" style="display: none">
          <button type="button" class="btn btn-secondary" id="btn-excel">导出 Excel</button>
          <button type="button" class="btn btn-secondary" id="btn-pdf">导出 PDF</button>
        </div>
      </section>

      <div id="placeholder" class="panel hidden-placeholder">输入产品名称并点击「生成报告」查看绿色流程与综合说明</div>

      <section class="panel" style="display: none">
        <h2>绿色生产流程</h2>
        <div class="flow-section" id="flow-container"></div>
      </section>

      <section class="panel" style="display: none">
        <h2>综合生产报告（最优方案摘要）</h2>
        <div id="report-main"></div>
      </section>

      <section class="panel">
        <h2>PDF 导出内容预览</h2>
        <p style="color: var(--muted); font-size: 0.85rem; margin: 0 0 1rem">
          下方区域将写入与 PDF 一致的正文摘要；导出 PDF 时请保持本区域在视口内已渲染完成。
        </p>
        <div id="pdf-export-area">
          <div class="pdf-title">绿色制造 · 综合生产报告</div>
          <div class="pdf-meta">生成报告后将在此显示摘要。</div>
        </div>
      </section>

      <footer class="no-print">演示数据为行业模板化示例，正式投产请以贵司工艺与质量体系为准。</footer>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
