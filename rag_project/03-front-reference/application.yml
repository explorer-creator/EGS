server:
  port: 8080

spring:
  application:
    name: egs-proxy
  config:
    # 自动合并本地的配置文件（如果存在）
    import: "optional:classpath:application-local.yml"

# 千问大模型配置 (对应 QwenProperties.java)
qwen:
  # 强制使用环境变量 DASHSCOPE_API_KEY，此处留空，切勿写死真实 Key
  api-key: ${DASHSCOPE_API_KEY:}
  model: qwen-turbo
  base-url: https://dashscope.aliyuncs.com/compatible-mode/v1