version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_vector_db
    restart: unless-stopped
    ports:
      - "6333:6333"  # REST API 端口
      - "6334:6334"  # gRPC 端口 (推荐 Java 客户端使用)
    volumes:
      - ./vector-data:/qdrant/storage  # 数据持久化挂载到当前目录
    environment:
      - QDRANT__SERVICE__MAX_REQUEST_SIZE_MB=50
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3